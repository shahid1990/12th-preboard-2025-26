<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:'Segoe UI', Arial, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
padding:20px;
}

.box{
background:#fff;
padding:25px;
max-width:600px;
margin:auto;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.header{text-align:center;margin-bottom:15px;}
.header img{height:70px;}

h2{text-align:center;color:#1e3c72;}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:12px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.search-btn{background:#1e3c72;color:#fff;}
.generate-btn{background:#2e8b57;color:#fff;}

#status{margin-top:15px;text-align:center;font-weight:600;}

#preview{
display:none;
margin-top:15px;
background:#f4f6fb;
padding:12px;
border-radius:8px;
}

#pdfPreviewContainer{
display:none;
margin-top:20px;
}

iframe{
width:100%;
height:600px;
border:1px solid #ccc;
border-radius:8px;
}

.footer{
text-align:center;
font-size:12px;
color:#eee;
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">

<div class="header">
<img src="image.jpeg">
<div>Affiliated to CBSE</div>
</div>

<h2>Pre-Board Result (2025-26)</h2>

<input id="admno" placeholder="Enter Admission Number">

<button class="search-btn" onclick="search()">Search Result</button>

<div id="status"></div>
<div id="preview"></div>

<button id="generateBtn" class="generate-btn" style="display:none;" onclick="generatePDF()">
Generate & Preview PDF
</button>

<div id="pdfPreviewContainer">
<iframe id="pdfFrame"></iframe>
<button class="generate-btn" onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<div class="footer">
© 2025 Sacred Heart School | Result Portal
</div>

<script>
const { jsPDF } = window.jspdf;

let students = [];
let currentStudent = null;

fetch('data.json')
.then(res=>res.json())
.then(data=>students=data);

function search(){
let adm = document.getElementById("admno").value.trim();

if(!adm){
status.innerHTML="<span style='color:red;'>Enter Admission Number</span>";
return;
}

let st = students.find(s=>String(s["Adm. No."]).trim()===adm);

if(!st){
status.innerHTML="<span style='color:red;'>Result Not Found</span>";
preview.style.display="none";
generateBtn.style.display="none";
return;
}

currentStudent = st;

status.innerHTML="<span style='color:green;'>Result Found</span>";

preview.style.display="block";

preview.innerHTML=`
<b>Name:</b> ${st["STUDENT'S NAME"]}<br>
<b>Father's Name:</b> ${st["FATHER'S NAME"]}<br>
<b>Class:</b> ${st["Class"]}-${st["Sec."]}<br>
<b>Roll No:</b> ${st["ROLL No."]}
`;

generateBtn.style.display="block";
}

function createPDF(){

const s = currentStudent;
const doc = new jsPDF("p","mm","a4");
const pageWidth = doc.internal.pageSize.getWidth();

let y = 20;

doc.setFont("times","bold");
doc.setFontSize(22);
doc.text("SACRED HEART SCHOOL", pageWidth/2, y,{align:"center"});

y+=8;

doc.setFontSize(12);
doc.text("PRE-BOARD EXAM RESULT (2025-26)", pageWidth/2, y,{align:"center"});

y+=15;

doc.setFont("times","normal");

doc.text("Student Name : "+s["STUDENT'S NAME"],20,y); y+=7;
doc.text("Father Name : "+s["FATHER'S NAME"],20,y); y+=7;
doc.text("Admission No : "+s["Adm. No."],20,y); y+=7;
doc.text("Roll No : "+s["ROLL No."],20,y); y+=7;
doc.text("Class : "+s["Class"]+"-"+s["Sec."],20,y);

y+=10;

// TABLE
const startX = 20;
const rowHeight = 10;

const col1 = 80;
const col2 = 40;
const col3 = 40;

doc.setFont("times","bold");

doc.rect(startX,y,col1,rowHeight);
doc.rect(startX+col1,y,col2,rowHeight);
doc.rect(startX+col1+col2,y,col3,rowHeight);

doc.text("SUBJECT", startX+5, y+7);
doc.text("FULL MARKS", startX+col1+8, y+7);
doc.text("MARKS", startX+col1+col2+12, y+7);

y+=rowHeight;

doc.setFont("times","normal");

// TOTAL CALCULATION
let total = 0;
let maxTotal = 0;
let pass = true;

function row(subject,full,marks){

doc.rect(startX,y,col1,rowHeight);
doc.rect(startX+col1,y,col2,rowHeight);
doc.rect(startX+col1+col2,y,col3,rowHeight);

doc.text(subject,startX+5,y+7);
doc.text(String(full),startX+col1+15,y+7);
doc.text(String(marks),startX+col1+col2+15,y+7);

total += Number(marks) || 0;
maxTotal += (typeof full === "string") ? (full.includes("/") ? Number(full.split("/")[0]) : Number(full)) : full;

// PASS CONDITION (min 33%)
if(Number(marks) < ( (typeof full === "string") ? (Number(full.split("/")[0])*0.33) : full*0.33 )){
pass = false;
}

y+=rowHeight;
}

// SUBJECTS
row("ENGLISH",80,s["ENGLISH (TH MAX-80 )"]);
row("PHYSICS",70,s["PHYSICS (TH MAX-70)"]);
row("CHEMISTRY",70,s["CHEMISTRY (TH MAX-70)"]);
row("MATHS",80,s["MATHS (TH MAX-80)"]);
row("BIOLOGY",70,s["BIOLOGY(TH MAX-70)"]);
row("PHYSICAL EDUCATION",70,s["PHYSICAL EDUCATION (TH MAX-70)"]);
row("CS / IT","70/60",s["CS/IT (TH MAX-70/60)"]);

y+=10;

// RESULT
let percentage = ((total/maxTotal)*100).toFixed(2);
let result = pass ? "PASS" : "FAIL";

doc.setFont("times","bold");

doc.text("Total Marks : "+total+" / "+maxTotal,20,y); y+=7;
doc.text("Percentage : "+percentage+" %",20,y); y+=7;
doc.text("Result : "+result,20,y);

y+=20;

doc.setFont("times","normal");
doc.text("Class Teacher",20,y);
doc.text("Principal",pageWidth-20,y,{align:"right"});

return doc;
}

function generatePDF(){
const doc = createPDF();
const blob = doc.output("blob");
const url = URL.createObjectURL(blob);
pdfFrame.src = url;
pdfPreviewContainer.style.display="block";
}

function downloadPDF(){
const doc = createPDF();
doc.save(`${currentStudent["Adm. No."]}-${currentStudent["STUDENT'S NAME"]}.pdf`);
}
</script>

</body>
</html>
